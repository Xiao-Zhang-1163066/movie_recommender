name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - server.js
      - routes/**
      - controller/**
      - middleware/**
      - validators/**
      - utils/**
      - config/**
      - prisma/**
      - Dockerfile
      - package*.json

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: moviemate.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: moviemate.azurecr.io/movie-mate-api:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name movie-mate-api \
            --resource-group ai-movie-mate-rg \
            --image moviemate.azurecr.io/movie-mate-api:latest
